##################
### custom key ###
##################

# [Help]
bind ? list-keys

# [Session]
# create session
bind s command-prompt -p "New Session:" "new-session -A -s '%%' -n ''"
bind -n M-N new-session -n ' '
bind -n M-M command-prompt -p "New Session:" "new-session -A -s '%%' -n ''"
# list sessions, panes and windows
bind / choose-tree
# rename session
bind < command-prompt -p "Rename session:" -I "#{session_name}" "rename-session '%%'"
bind -n M-< command-prompt -p "Rename session:" -I "#{session_name}" "rename-session '%%'"
bind -n M-. command-prompt -p "Rename session:" -I "#{session_name}" "rename-session '%%'"
# switch session
bind [ switch-client -p
bind ] switch-client -n
# switch session (stop at first and last)
bind -n M-k run 'tmux.previous-session'
bind -n M-j run 'tmux.next-session'
# bar position
bind Up set -g status-position top
bind Down set -g status-position bottom

# [Window]
# create window
bind n new-window -a -c '#{pane_current_path}' -n ' '
bind N new-window -b -c '#{pane_current_path}' -n ' '
bind -n M-n new-window -a -c '#{pane_current_path}' -n ' '
bind c command-prompt -p "Name of new window:" "new-window -a -c '#{pane_current_path}' -n '%%'"
# rename window
bind -n M-, if -F "#{==:#W, }" \
    'command-prompt -p "Rename window:" -I "" "rename-window \"%%\""' \
    'command-prompt -p "Rename window:" -I "#W" "rename-window \"%%\""'
# switch windows, create when first/last (alt+l gonna conflict with win11!)
bind -n M-h if -F '#{e|>:#I,1}' \
    previous-window \
    "new-window -b -c '#{pane_current_path}' -n ' '"
bind -n M-l if -F '#{e|<:#I,#{session_windows}}' \
    next-window \
    "new-window -a -c '#{pane_current_path}' -n ' '"
# swap windows
bind -n M-H if -F '#{e|>:#I,1}' 'swap-window -d -t -1'
bind -n M-L if -F '#{e|<:#I,#{session_windows}}' 'swap-window -d -t +1'
# select windows
bind -n M-0 select-window -t :=0
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# [Pane]
# split panes using | and -
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -b -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind | split-window -b -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}" \; select-layout even-vertical
bind -n M-_ split-window -b -v -c "#{pane_current_path}" \; select-layout even-vertical
bind -n M-\\ split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind -n M-| split-window -b -h -c "#{pane_current_path}" \; select-layout even-horizontal
# zoom panes
unbind z
bind -N "Maximize active pane (replace z)" m resize-pane -Z 
bind -N "Maximize active pane (replace z)" C-m resize-pane -Z
# resize panes
bind -r h resize-pane -L 2
bind -r j resize-pane -D 1
bind -r k resize-pane -U 1
bind -r l resize-pane -R 2
# swap panes
bind -r H swap-pane -D
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r L swap-pane -U
# quit pane
bind -n M-d confirm-before -y -p "kill current pane ([Y]/n)? " kill-pane

# [Jumping]
# toggle between two windows
# bind -n M-\; last-pane
# remove these prevent unintended swap panes
unbind C-h
unbind C-j
unbind C-k
unbind C-l

# [Editing]
# <prefix>-; to clear screen
unbind C-\;
bind \; send-keys C-l
bind -n M-\; send-keys C-l
# enter copy mode
bind Enter copy-mode
# y to copy visual selected text
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Q to toggle rectangle selection mode
bind -T copy-mode-vi Q send-keys -X rectangle-toggle

# [Copy Mode]
# clear some defaults
unbind -T copy-mode-vi Space
# <prefix> Space to enter and exit copy-mode
bind -T prefix Space copy-mode
bind -T copy-mode-vi Space send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel
# <prefix> v begin selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi q send-keys -X rectangle-toggle
# Alt+/ enter copy mode, go to previous prompt with content
bind -n M-/ copy-mode \; send-keys -X previous-prompt -o \; send-keys -X previous-prompt \
# Alt+J/K jump to next/previous prompt
bind -n M-J copy-mode \; send-keys -X next-prompt
bind -n M-K copy-mode \; send-keys -X previous-prompt
# J/K jump to next/previous prompt
bind -T copy-mode-vi J send-keys -X next-prompt
bind -T copy-mode-vi K send-keys -X previous-prompt
# Alt+` kill window, if window_name is non empty, prompt before kill
bind -n M-` if "echo '#{window_name}' | grep -q '[^ ]'" \
    "confirm-before -p 'Kill named window \"#{window_name}\"? (y/n)' kill-window" \
    "kill-window"

# [vim-tmux-navigator]
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l
